version: 2
updates:
  # master branch
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 1

  # fluent-package-v6 branch
  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: 'fluent-package-v6'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 1
