name: Yum based Linux (AArch64)
on:
  push:
    branches:
      - master
      - fluent-package-v6
  pull_request:
concurrency:
  group: ${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true
jobs:
  define-matrix:
    runs-on: ubuntu-24.04-arm
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: set-matrix
        # See https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/evaluate-expressions-in-workflows-and-actions#example-returning-a-json-object
        run: echo "matrix=$(cat yum-arm.matrix.json | jq --compact-output)" >> $GITHUB_OUTPUT
        working-directory: .github/workflows/
  build:
    runs-on: ubuntu-24.04-arm
    name: Build
    needs: define-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build rpm on ${{ matrix.label }}
        uses: ./.github/actions/build-rpm
        with:
          rake-job: ${{ matrix.rake-job }}-aarch64
          next-major: 'false'
          cache-group: v6
  build-next:
    runs-on: ubuntu-24.04-arm
    name: Build next major
    needs: define-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build next major rpm on ${{ matrix.label }}
        uses: ./.github/actions/build-rpm
        with:
          rake-job: ${{ matrix.rake-job }}-aarch64
          next-major: 'true'
          cache-group: v7
  check_package_size:
    name: Check Package Size
    runs-on: ubuntu-24.04-arm
    needs: [define-matrix, build]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packages-${{ matrix.rake-job }}-aarch64
          path: fluent-package/yum/repositories
      - name: Check Package Size
        run: |
          fluent-package/yum/pkgsize-test.sh ${{ matrix.rake-job }} aarch64
  installation_test:
    runs-on: ubuntu-24.04-arm
    name: Installation Test
    needs: [define-matrix, build]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Installation Test on ${{ matrix.label }}
        uses: ./.github/actions/test-on-docker
        with:
          repository-type: yum
          rake-job: ${{ matrix.rake-job }}-aarch64
          test-script: install-test.sh
          test-docker-image: ${{ matrix.test-docker-image }}
  serverspec_test:
    runs-on: ubuntu-24.04-arm
    name: Serverspec Test
    needs: [define-matrix, build]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Serverspec Test on ${{ matrix.label }}
        uses: ./.github/actions/test-on-docker
        with:
          repository-type: yum
          rake-job: ${{ matrix.rake-job }}-aarch64
          test-docker-image: ${{ matrix.test-docker-image }}
          test-script: serverspec-test.sh
  confluent_test:
    runs-on: ubuntu-24.04-arm
    name: Confluent Test
    needs: [define-matrix, build]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Confluent Test on ${{ matrix.label }}
        uses: ./.github/actions/test-on-docker
        with:
          repository-type: yum
          rake-job: ${{ matrix.rake-job }}-aarch64
          test-docker-image: ${{ matrix.test-docker-image }}
          test-script: confluent-test.sh
  binstubs_test:
    runs-on: ubuntu-24.04-arm
    name: Binstubs Test
    needs: [define-matrix, build]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Binstubs Test on ${{ matrix.label }}
        uses: ./.github/actions/test-on-docker
        with:
          repository-type: yum
          rake-job: ${{ matrix.rake-job }}-aarch64
          test-docker-image: ${{ matrix.test-docker-image }}
          test-script: binstubs-test.sh
