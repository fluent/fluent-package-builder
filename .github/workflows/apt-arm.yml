name: Apt based Linux (AArch64)
on:
  push:
    branches:
      - master
      - fluent-package-v5
      - fluent-package-v6
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true
jobs:
  define-matrix:
    runs-on: ubuntu-24.04-arm
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: set-matrix
        # See https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/evaluate-expressions-in-workflows-and-actions#example-returning-a-json-object
        run: echo "matrix=$(cat apt-arm.matrix.json | jq --compact-output)" >> $GITHUB_OUTPUT
        working-directory: .github/workflows/
  build:
    name: Build
    runs-on: ubuntu-24.04-arm
    needs: define-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build deb on ${{ matrix.label }}
        uses: ./.github/actions/build-deb
        with:
          rake-job: ${{ matrix.rake-job }}-arm64
          next-major: 'false'
          cache-group: v6
          rake-options: ${{ matrix.rake-options }}

  check_package_size:
    name: Check Package Size
    runs-on: ubuntu-24.04-arm
    needs: [define-matrix, build]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packages-${{ matrix.rake-job }}-arm64
          path: fluent-package/apt/repositories
      - name: Check Package Size
        run: |
          fluent-package/apt/pkgsize-test.sh ${{ matrix.rake-job }} arm64
  binstubs_test:
    name: Binstubs Test
    runs-on: ubuntu-24.04-arm
    needs: [define-matrix, build]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Binstubs Test on ${{ matrix.label }}
        uses: ./.github/actions/test-on-docker
        with:
          rake-job: ${{ matrix.rake-job }}-arm64
          repository-type: apt
          test-docker-image: ${{ matrix.test-docker-image }}
          test-script: binstubs-test.sh
  installation_test:
    name: Installation Test
    runs-on: ubuntu-24.04-arm
    needs: [define-matrix, build]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Installation Test on ${{ matrix.label }}
        uses: ./.github/actions/test-on-docker
        with:
          rake-job: ${{ matrix.rake-job }}-arm64
          repository-type: apt
          test-docker-image: ${{ matrix.test-docker-image }}
          test-script: install-test.sh
  piuparts_test:
    name: Piuparts Test
    runs-on: ubuntu-24.04-arm
    needs: [define-matrix, build]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Piuparts Test on ${{ matrix.label }}
        uses: ./.github/actions/test-on-docker
        with:
          rake-job: ${{ matrix.rake-job }}-arm64
          docker-options: --privileged
          repository-type: apt
          test-docker-image: ${{ matrix.test-docker-image }}
          test-script: piuparts-test.sh
  serverspec_test:
    name: Serverspec Test
    runs-on: ubuntu-24.04-arm
    needs: [define-matrix, build]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Serverspec Test on ${{ matrix.label }}
        uses: ./.github/actions/test-on-docker
        with:
          rake-job: ${{ matrix.rake-job }}-arm64
          repository-type: apt
          test-docker-image: ${{ matrix.test-docker-image }}
          test-script: serverspec-test.sh
  confluent_test:
    name: Confluent Test
    runs-on: ubuntu-24.04-arm
    needs: [define-matrix, build]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Confluent Test on ${{ matrix.label }}
        uses: ./.github/actions/test-on-docker
        with:
          rake-job: ${{ matrix.rake-job }}-arm64
          repository-type: apt
          test-docker-image: ${{ matrix.test-docker-image }}
          test-script: confluent-test.sh
